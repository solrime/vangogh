<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Marker Based AR - Stabilna Rzeźba</title>
    <!-- Dołączenie A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Dołączenie AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Konfiguracja arjs -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <!-- Ładowanie zasobów -->
        <a-assets>
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- DODANO: Wygładzanie pozycji (smooth, smoothCount, smoothTolerance) -->
        <a-marker 
            type="pattern" 
            url="marker.patt"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5">
            
            <!-- Model rzeźby -->
            <a-entity 
                gltf-model="#sculpture" 
                scale="0.5 0.5 0.5" 
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>
            
        </a-marker>

        <!-- Światła -->
        <a-entity light="type: ambient; color: #FFF; intensity: 1.5"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1" position="-1 2 1"></a-entity>

        <!-- ZMIENIONO: Kamera z wyłączonym sterowaniem myszą/ruchem, aby nie "odklejać" sceny -->
        <a-entity camera="active: true;" look-controls="enabled: false"></a-entity>

    </a-scene>
  <script>
        document.body.addEventListener('click', function() {
            // Szukamy elementu <video>, który AR.js automatycznie tworzy dla kamery
            const video = document.querySelector('video');
            
            if (video && video.srcObject) {
                const videoTrack = video.srcObject.getVideoTracks()[0];
                
                if (videoTrack && typeof videoTrack.getCapabilities === 'function') {
                    const capabilities = videoTrack.getCapabilities();
                    
                    // Sprawdzamy, czy przeglądarka i telefon wspierają kontrolę focusu
                    if (capabilities.focusMode) {
                        const currentConstraints = videoTrack.getConstraints();
                        
                        // Krok 1: Wymuszamy tryb ręczny (lub ciągły), aby zresetować focus
                        videoTrack.applyConstraints({
                            advanced: [{ focusMode: 'single-shot' }]
                        }).then(() => {
                            // Krok 2: Po krótkiej chwili wracamy do trybu ciągłego (continuous)
                            setTimeout(() => {
                                videoTrack.applyConstraints({
                                    advanced: [{ focusMode: 'continuous' }]
                                });
                            }, 500);
                        }).catch(err => console.log("Focus error:", err));
                    }
                } else {
                    // Alternatywny "brutalny" trik dla starszych urządzeń/iOS:
                    // Szybkie pauzowanie i wznawianie wideo często zmusza system do ponownego złapania ostrości
                    video.pause();
                    setTimeout(() => { video.play(); }, 100);
                }
            }
        });
    </script>

</body>
</html>
