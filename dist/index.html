<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR.js Debug - Test Kostki</title>
    <!-- Dołączenie A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Dołączenie AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_matrix; matrixCodeType: 3x3; sourceWidth:1280; sourceHeight:720; displayWidth: 1280; displayHeight: 720;">
        
        <!-- Pusty kontener na zasoby, bo na razie nic nie ładujemy z zewnątrz -->
        <a-assets></a-assets>

        <!-- Marker z aktywnym filtrowaniem drgań (smooth) -->
        <a-marker 
            type="pattern" 
            url="marker.patt"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5">
            
            <!-- Prosty, testowy sześcian o boku 1 metra (w skali AR) -->
            <!-- Pozycja Y: 0.5 unosi go idealnie na powierzchnię markera (bo środek ciężkości boxa jest w jego centrum) -->
            <a-box 
                position="0 0.5 0" 
                material="color: #FF0055; opacity: 0.8;"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
            </a-box>

        </a-marker>

        <!-- Podstawowe oświetlenie sceny -->
        <a-entity light="type: ambient; color: #FFF; intensity: 1.0"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1.0" position="-1 2 1"></a-entity>

        <!-- Kamera AR.js -->
        <a-entity camera></a-entity>

    </a-scene>

    <!-- Skrypt Tap to focus -->
    <script>
        document.body.addEventListener('click', function() {
            const video = document.querySelector('video');
            if (video && video.srcObject) {
                const videoTrack = video.srcObject.getVideoTracks()[0];
                if (videoTrack && typeof videoTrack.getCapabilities === 'function') {
                    const capabilities = videoTrack.getCapabilities();
                    if (capabilities.focusMode) {
                        videoTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] }).then(() => {
                            setTimeout(() => {
                                videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                            }, 500);
                        }).catch(err => console.log(err));
                    }
                } else {
                    video.pause();
                    setTimeout(() => { video.play(); }, 100);
                }
            }
        });
    </script>

</body>
</html>
