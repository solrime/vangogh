<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Marker Based AR - Fix</title>
    <!-- Stabilna wersja A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Stabilna wersja AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* Uniwersalna naprawa wideo dla iOS i Androida bez zbędnego zoomu */
        #arjs-video {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: cover !important;
            z-index: -1;
        }
        .a-canvas {
            z-index: 1;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Wymuszenie standardowej rozdzielczości i tylnej kamery (facingMode: environment) -->
    <a-scene embedded 
             arjs="sourceType: webcam; 
                   sourceWidth: 640; 
                   sourceHeight: 480; 
                   displayWidth: 640; 
                   displayHeight: 480;
                   facingMode: environment;
                   debugUIEnabled: false; 
                   detectionMode: mono_and_matrix; 
                   matrixCodeType: 3x3;">
        
        <!-- Ładowanie zasobów -->
        <a-assets>
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Definicja markera -->
        <a-marker type="pattern" url="marker.patt">
            <a-entity 
                gltf-model="#sculpture" 
                scale="0.3 0.3 0.3" 
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <!-- Światło -->
        <a-entity light="type: ambient; color: #FFF; intensity: 1.5"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1" position="-1 2 1"></a-entity>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
