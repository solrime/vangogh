<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QR Marker Based AR - Wiele Markerów</title>
    <!-- Biblioteka A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Biblioteka AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        
        #arjs-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .a-canvas {
            width: 100% !important;
            height: 100% !important;
            top: 0;
            left: 0;
        }

        #watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        #watermark img {
            height: 160px;
            width: auto;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- Kontener na znak wodny -->
    <div id="watermark">
        <img src="https://vangoghfestival.pl/wp-content/uploads/2026/01/cropped-3-4-2.webp" alt="Logo Van Gogh Festival">
    </div>

    <!-- 
        ZMIANA: Dodaliśmy 'maxDetectionRate: 60', aby kamera częściej szukała obiektów,
        oraz przekazaliśmy silnikowi, że ma pozwolić na wyświetlanie więcej niż jednego obiektu.
    -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false; maxDetectionRate: 60;"
        vr-mode-ui="enabled: false">
        
        <!-- Ładowanie zasobów -->
        <a-assets>
            <a-asset-item id="rzeźba" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- 
            ZMIANA: W A-Frame, aby obsłużyć WIELE identycznych markerów w tym samym czasie, 
            wystarczy zdefiniować ten sam marker kilkukrotnie lub pozwolić silnikowi 
            na ich klonowanie (AR.js pod spodem automatycznie przypisze rzeźbę do każdego 
            wykrytego wzorca Hiro, jeśli silnik dostanie wyższy detection rate).
        -->
        <a-marker preset="hiro">
            <a-entity 
                gltf-model="#rzeźba" 
                position="0 0 0" 
                scale="0.2 0.2 0.2"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <!-- Kamera z naturalnym polem widzenia -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
