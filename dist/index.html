<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt A-Frame AR z Twoim Modelem</title>
    <!-- Dołączenie A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Dołączenie AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Scena AR z wyłączonym interfejsem VR i włączoną kamerą w tle -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Zarządzanie zasobami - ładowanie modelu GLB -->
        <a-assets>
            <a-asset-item id="moj-model" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- 
          W tym przykładzie model jest przypisany do standardowego znacznika (Hiro).
          Skieruj kamerę telefonu/komputera na znacznik "Hiro", aby zobaczyć model.
          Grafikę znacznika znajdziesz w Google wpisując "Hiro marker".
        -->
        <a-marker preset="hiro">
            <a-entity 
                gltf-model="#moj-model"
                position="0 0 0" 
                scale="1 1 1"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
