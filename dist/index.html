<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabilny AR - Rzeźba Raz na Zawsze</title>
    <!-- Biblioteka A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Biblioteka AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        // Rejestrujemy niestandardowy komponent do obsługi logiki "pojaw się tylko raz"
        AFRAME.registerComponent('freeze-on-first-sight', {
            init: function () {
                const marker = this.el;
                const scene = document.querySelector('a-scene');
                const model = document.querySelector('#sculpture');
                let hasSpawned = false;

                marker.addEventListener('markerFound', () => {
                    // Jeśli rzeźba już stoi, olewamy kolejne wykrycia markera
                    if (hasSpawned) return; 
                    
                    hasSpawned = true;

                    // Pobieramy aktualną pozycję i rotację markera w świecie rzeczywistym
                    const worldPosition = new THREE.Vector3();
                    marker.object3D.getWorldPosition(worldPosition);

                    const worldQuaternion = new THREE.Quaternion();
                    marker.object3D.getWorldQuaternion(worldQuaternion);

                    // Przypisujemy te współrzędne do modelu rzeźby
                    model.object3D.position.copy(worldPosition);
                    model.object3D.quaternion.copy(worldQuaternion);

                    // Czynimy model widocznym
                    model.setAttribute('visible', true);

                    // Opcjonalnie: odpinamy komponenty AR, żeby telefon nie marnował baterii na szukanie markera
                    marker.removeAttribute('arjs-anchor');
                    marker.removeAttribute('component-anchor');
                    
                    console.log("Rzeźba postawiona na stałe!");
                });
            }
        });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Scena AR -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Ładowanie zasobów -->
        <a-assets>
            <a-asset-item id="sculpture-model" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Definicja markera z przypisanym naszym skryptem freeze-on-first-sight -->
        <a-marker type="pattern" url="marker.patt" freeze-on-first-sight>
            <!-- Marker zostawiamy pusty lub jako punkt odniesienia, rzeźba żyje teraz niezależnie -->
        </a-marker>

        <!-- Model rzeźby umieszczony bezpośrednio w scenie (nie w markerze) -->
        <!-- Domyślnie jest ukryty (visible="false") i uaktywnia się dopiero po znalezieniu markera -->
        <a-entity 
            id="sculpture"
            gltf-model="#sculpture-model"
            position="0 0 0" 
            scale="1 1 1"
            rotation="0 0 0"
            visible="false">
        </a-entity>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
