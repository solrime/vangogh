<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Marker Based AR - Naprawiona Kamera</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* Krytyczna poprawka zoomu i rozciągania na telefonach */
        #arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important; /* Możesz zmienić na 'contain', jeśli obraz wciąż jest lekko ścięty */
            position: fixed;
            top: 0;
            left: 0;
            margin-left: 0 !important;
            margin-top: 0 !important;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Dodane parametry i displayWidth/Height dopasowane pod ekrany smartfonów -->
    <a-scene embedded 
             arjs="sourceType: webcam; 
                   debugUIEnabled: false; 
                   detectionMode: mono_and_matrix; 
                   matrixCodeType: 3x3;
                   sourceWidth: 640; 
                   sourceHeight: 480; 
                   displayWidth: 640; 
                   displayHeight: 480;
                   videoTexture: true;">
        
        <a-assets>
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="marker.patt">
            <a-entity 
                gltf-model="#sculpture" 
                scale="0.5 0.5 0.5" 
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <!-- Oświetlenie sceny -->
        <a-entity light="type: ambient; color: #FFF; intensity: 1.5"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1" position="-1 2 1"></a-entity>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
