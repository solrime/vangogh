<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Marker Based AR - Poprawiona Kamera</title>
    <!-- Dołączenie stabilnej wersji A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Dołączenie oficjalnej i stabilnej ścieżki AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Usunięto sztywne wymiary i videoTexture, które często powodują błędy w nakładaniu obiektów 3D -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <!-- Zewnętrzny model GLB -->
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Definicja markera (upewnij się, że ścieżka do marker.patt jest poprawna) -->
        <a-marker type="pattern" url="marker.patt">
            
            <!-- Dodano testowy czerwony boks, aby sprawdzić czy sam marker w ogóle działa -->
            <a-box position="0 0.5 0" material="color: red; opacity: 0.5;" scale="0.2 0.2 0.2"></a-box>

            <!-- Model rzeźby: Zwiększono skalę i lekko podniesiono pozycję (o 0.5 w górę na osi Y) -->
            <a-entity 
                gltf-model="#sculpture" 
                scale="5 5 5" 
                position="0 0.5 0"
                rotation="0 0 0">
            </a-entity>
            
        </a-marker>

        <!-- Kamera z domyślnym dla AR.js znacznikiem -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
