<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Marker Based AR - Maksymalna Stabilizacja</title>
    <!-- Dołączenie A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Dołączenie AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>

    <script>
        // Rejestracja brakującego komponentu stabilizacji poszukiwanego przez marker
        AFRAME.registerComponent('stabilize-model', {
            schema: {
                target: { type: 'selector' }, // ID kontenera rzeźby
                lerpFactor: { type: 'number', default: 0.15 } // Im mniejsza wartość, tym płynniejszy ruch, ale większe opóźnienie
            },
            init: function () {
                this.markerVisible = false;
                this.targetElement = this.data.target;

                // Reakcja na znalezienie markera
                this.el.addEventListener('markerFound', () => {
                    this.markerVisible = true;
                    if (this.targetElement) this.targetElement.setAttribute('visible', true);
                });

                // Reakcja na zgubienie markera
                this.el.addEventListener('markerLost', () => {
                    this.markerVisible = false;
                    // Możesz opcjonalnie ukryć model od razu lub pozwolić mu zostać w ostatniej pozycji:
                    // if (this.targetElement) this.targetElement.setAttribute('visible', false);
                });
            },
            tick: function (time, timeDelta) {
                // Jeśli marker jest widoczny, płynnie (LERP) kopiujemy jego pozycję i rotację do zewnętrznego kontenera
                if (this.markerVisible && this.targetElement) {
                    const markerPos = this.el.object3D.position;
                    const markerRot = this.el.object3D.quaternion;

                    // Płynna interpolacja pozycji
                    this.targetElement.object3D.position.lerp(markerPos, this.data.lerpFactor);
                    
                    // Płynna interpolacja rotacji
                    this.targetElement.object3D.quaternion.slerp(markerRot, this.data.lerpFactor);
                }
            }
        });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Podbita rozdzielczość kamery dla lepszej detekcji i zredukowania szumów -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; sourceWidth:1280; sourceHeight:720; displayWidth: 1280; displayHeight: 720;">
        
        <!-- Ładowanie zasobów -->
        <a-assets>
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Fizyczny marker służy TERAZ TYLKO jako punkt odniesienia -->
        <!-- Poprawnie domknięty znacznik oraz dodany komponent stabilizacji powiązany z kontenerem -->
        <a-marker type="pattern" url="marker.patt" stabilize-model="target: #sculpture-container; lerpFactor: 0.2">
        </a-marker>

        <!-- Kontener rzeźby umieszczony bezpośrednio w scenie (nie wewnątrz markera) -->
        <!-- Skrypt steruje jego widocznością i pozycją -->
        <a-entity id="sculpture-container" visible="false">
            <a-entity 
                gltf-model="#sculpture" 
                scale="0.5 0.5 0.5" 
                position="0 0.1 0"
                rotation="0 0 0">
            </a-entity>
        </a-entity>

        <!-- Światła -->
        <a-entity light="type: ambient; color: #FFF; intensity: 1.5"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1" position="-1 2 1"></a-entity>

        <!-- Kamera z całkowicie zablokowanym sterowaniem A-Frame -->
        <a-entity camera look-controls="enabled: false"></a-entity>

    </a-scene>

    <!-- Skrypt Focusu (Tap to focus przy kliknięciu ekranu) -->
    <script>
        document.body.addEventListener('click', function() {
            const video = document.querySelector('video');
            if (video && video.srcObject) {
                const videoTrack = video.srcObject.getVideoTracks()[0];
                if (videoTrack && typeof videoTrack.getCapabilities === 'function') {
                    const capabilities = videoTrack.getCapabilities();
                    if (capabilities.focusMode) {
                        videoTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] }).then(() => {
                            setTimeout(() => {
                                videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                            }, 500);
                        }).catch(err => console.log(err));
                    }
                } else {
                    video.pause();
                    setTimeout(() => { video.play(); }, 100);
                }
            }
        });
    </script>

</body>
</html>
