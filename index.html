<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Marker Based AR - Rzeźba</title>
    <!-- Biblioteka A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Biblioteka AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Scena AR -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Ładowanie zasobów (modelu GLB) -->
        <a-assets>
            <a-asset-item id="rzeźba" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Definicja markera Hiro -->
        <a-marker preset="hiro">
            <!-- 
                Wyświetlenie modelu 3D. 
                Skala (scale) i pozycja (position) mogą wymagać delikatnej korekty 
                w zależności od oryginalnych wymiarów modelu w pliku GLB.
            -->
            <a-entity 
                gltf-model="#rzeźba" 
                position="0 0 0" 
                scale="1 1 1"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
