<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marker-based AR Rzeźba</title>
    <!-- Dołączenie A-Frame oraz AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Inicjalizacja sceny AR -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Ładowanie zasobów (Twojej rzeźby GLB) -->
        <a-assets>
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></asset-item>
        </a-assets>

        <!-- Definicja markera (Używamy standardowego markera HIRO) -->
        <a-marker preset="hiro">
            <!-- 
                Wyświetlenie rzeźby na markerze.
                Skala (scale) i pozycja (position) mogą wymagać dostosowania 
                w zależności od oryginalnych wymiarów modelu GLB.
            -->
            <a-entity 
                gltf-model="#sculpture" 
                position="0 0 0" 
                scale="1 1 1"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
            </a-entity>
        </a-marker>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </scene>

</body>
</html>
