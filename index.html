<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Marker Based AR - Maksymalna Stabilizacja</title>
    <!-- Dołączenie A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Dołączenie AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- arjs tuning: podbita rozdzielczość oraz wyłączona emulacja ułatwiają precyzyjne śledzenie -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_matrix; matrixCodeType: 3x3; sourceWidth:1280; sourceHeight:720; displayWidth: 1280; displayHeight: 720;">
        
        <!-- Ładowanie zasobów -->
        <a-assets>
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Poniższe parametry 'smooth' aktywują wewnętrzne filtry AR.js redukujące szum -->
        <a-marker 
            type="pattern" 
            url="marker.patt"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5">
            
            <!-- Model umieszczony bezpośrednio w markerze gwarantuje, że skala pozostanie nienaruszona -->
            <a-entity 
                gltf-model="#sculpture" 
                scale="0.5 0.5 0.5" 
                position="0 0.1 0"
                rotation="0 0 0">
            </a-entity>

        </a-marker>

        <!-- Światła -->
        <a-entity light="type: ambient; color: #FFF; intensity: 1.5"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1" position="-1 2 1"></a-entity>

        <!-- Kamera systemu AR.js -->
        <a-entity camera></a-entity>

    </a-scene>

    <!-- Skrypt Focusu (Tap to focus przy kliknięciu ekranu) -->
    <script>
        document.body.addEventListener('click', function() {
            const video = document.querySelector('video');
            if (video && video.srcObject) {
                const videoTrack = video.srcObject.getVideoTracks()[0];
                if (videoTrack && typeof videoTrack.getCapabilities === 'function') {
                    const capabilities = videoTrack.getCapabilities();
                    if (capabilities.focusMode) {
                        videoTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] }).then(() => {
                            setTimeout(() => {
                                videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                            }, 500);
                        }).catch(err => console.log(err));
                    }
                } else {
                    video.pause();
                    setTimeout(() => { video.play(); }, 100);
                }
            }
        });
    </script>

</body>
</html>
