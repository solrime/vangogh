<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <title>AR Rzeźba - Anchor</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene
  embedded
  vr-mode-ui="enabled: false"
renderer="
antialias: true;
precision: high;
powerPreference: high-performance;
sortObjects: true;
logarithmicDepthBuffer: true; /* Pomaga w stabilizacji modelu przy obrotach */
"
  arjs="
    trackingMethod: best;
    sourceType: webcam;
    detectionMode: mono_and_matrix;
    matrixCodeType: 3x3;
    debugUIEnabled: false;
    labelingMode: black_region; /* Poprawia detekcję czarnej ramki markera */
  ">
        
        <a-assets>
            <a-asset-item id="sculpture-model" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro" smooth="false">
            <a-entity
                gltf-model="#sculpture-model"
                scale="0.1 0.1 0.1"
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
