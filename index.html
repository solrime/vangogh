<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosty AR - Rzeźba</title>
    <!-- Biblioteka A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Biblioteka AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Scena AR -->
<a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_matrix; matrixCodeType: 3x3; imageSmoothingEnabled: true; trackingMethod: best;"
    gesture-detector>
        
        <!-- Zarządzanie zasobami (ładowanie modelu 3D) -->
        <a-assets>
            <a-asset-item id="sculpture-model" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Definicja Twojego markera -->
        <!-- Plik 'marker.patt' musi być w tym samym folderze co ten plik HTML -->
        <a-marker type="pattern" url="marker.patt">
            
            <!-- Twój model 3D nałożony na marker -->
            <!-- Skala (scale) i pozycja (position) mogą wymagać korekty w zależności od wielkości oryginalnego modelu -->
            <a-box position="0 1.5 -5" rotation="0 45 45" color="#4CC3D9"></a-box>

        </a-marker>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
