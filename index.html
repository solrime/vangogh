<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QR Marker Based AR - Rzeźba z Logo</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Całkowite czyszczenie marginesów i blokada suwaków */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        
        /* Wymuszenie na wideo z kamery zajęcia 100% ekranu bez pasków */
        #arjs-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Wymuszenie na warstwie 3D (A-Frame), by idealnie pokrywała wideo */
        .a-canvas {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Stylowanie logo w prawym dolnym rogu */
        #logo-container {
            position: absolute;
            bottom: 20px; /* Odstęp od dołu */
            right: 20px;  /* Odstęp od prawej */
            z-index: 1000; /* Upewnia się, że logo jest nad sceną AR */
            pointer-events: none; /* Zapobiega interakcji z logo, przepuszcza kliknięcia */
        }

        #logo-container img {
            max-width: 150px; /* Maksymalna szerokość logo */
            height: auto;    /* Zachowanie proporcji */
            display: block;  /* Usuwa domyślny margines pod obrazkiem */
            /* Opcjonalnie: cień, by logo było lepiej widoczne */
            filter: drop-shadow(0px 0px 5px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>

    <div id="logo-container">
        <img src="https://vangoghfestival.pl/wp-content/uploads/2026/01/cropped-3-4-2.webp" alt="Logo Van Gogh Festival">
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="rzeźba" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <a-entity 
                gltf-model="#rzeźba" 
                position="0 0 0" 
                scale="1 1 1"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
