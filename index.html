<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR.js Debug - Test Kostki</title>
    <!-- Dołączenie A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Dołączenie AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene 
        embedded 
        arjs="sourceType: webcam; ">
        
        <!-- Pusty kontener na zasoby, bo na razie nic nie ładujemy z zewnątrz -->
        <a-assets></a-assets>

        <!-- Marker z aktywnym filtrowaniem drgań (smooth) -->
        <a-marker 
            type="pattern" 
            url="marker.patt"
            smooth="true"
            smoothCount="10"
            smoothTolerance="0.01"
            smoothThreshold="5">
            
            <!-- Prosty, testowy sześcian o boku 1 metra (w skali AR) -->
            <!-- Pozycja Y: 0.5 unosi go idealnie na powierzchnię markera (bo środek ciężkości boxa jest w jego centrum) -->
            <a-box 
                position="0 0.5 0" 
                material="color: #FF0055; opacity: 0.8;"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
            </a-box>

        </a-marker>


        <!-- Kamera AR.js -->
        <a-entity camera></a-entity>

    </a-scene>

   
</body>
</html>
