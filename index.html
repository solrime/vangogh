<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Marker Based AR - Fix Proporcji</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* Wymuszenie na liście wideo poprawnego zachowania */
        video, #arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important; /* Obcina boki zamiast rozciągać obraz */
            position: absolute;
            top: 0;
            left: 0;
            margin: 0 !important;
            padding: 0 !important;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Usunęliśmy sztywne sourceWidth/Height, dodajemy domyślne śledzenie kamery -->
    <a-scene embedded 
             renderer="logarithmicDepthBuffer: true;"
             arjs="sourceType: webcam; 
                   debugUIEnabled: false; 
                   detectionMode: mono_and_matrix; 
                   matrixCodeType: 3x3;">
        
        <a-assets>
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Używamy prostszej nazwy pliku ze względu na błędy w adresach URL na telefonach -->
        <a-marker type="pattern" url="marker.patt">
            
            <!-- Model rzeźby -->
            <a-entity 
                gltf-model="#sculpture" 
                scale="1 1 1" 
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>
            
        </a-marker>

        <!-- Dodajemy fov do kamery, żeby wymusić naturalną perspektywę w A-Frame -->
        <a-entity camera="fov: 60; near: 0.1; far: 1000;"></a-entity>

    </a-scene>

</body>
</html>
