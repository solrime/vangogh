<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Marker Based AR - Poprawiona Kamera</title>
    <!-- Dołączenie A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Dołączenie AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Wymuszenie pełnego ekranu i reset stylów, żeby wideo nie wyskakiwało poza ramki */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* Naprawa problemu z pozycjonowaniem kontenera wideo przez AR.js */
        #arjs-video {
            width: 100% !important;
            height: 100% !important;
            margin-left: 0 !important;
            margin-top: 0 !important;
            object-fit: cover !important;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Zmiany w arjs: dodane videoTexture: true oraz dopasowanie sourceWidth/Height -->
    <a-scene embedded 
             arjs="sourceType: webcam; 
                   debugUIEnabled: false; 
                   sourceWidth: 1280; 
                   sourceHeight: 960; 
                   displayWidth: 1280; 
                   displayHeight: 960; 
                   videoTexture: true;">
        
        <!-- Ładowanie zasobów (Rzeźba GLB) -->
        <a-assets>
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Definicja Twojego markera .patt -->
        <a-marker type="pattern" url="pattern-qr-code (8).patt">
            
            <!-- Model rzeźby -->
            <a-entity 
                gltf-model="#sculpture" 
                scale="1 1 1" 
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>
            
        </a-marker>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
