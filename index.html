<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Prosty AR - Poprawiona Kamera</title>
    <!-- Biblioteka A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Biblioteka AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* Wymuszenie poprawnego wyświetlania wideo na pełnym ekranie bez zniekształceń */
        body { margin: 0; overflow: hidden; }
        #arjs-video {
            object-fit: cover !important;
            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>
<body>

    <!-- Poprawiona konfiguracja sceny AR -->
    <a-scene embedded 
             arjs="sourceType: webcam; 
                   debugUIEnabled: false; 
                   sourceWidth: 1280; 
                   sourceHeight: 960; 
                   displayWidth: 1280; 
                   displayHeight: 960;">
        
        <!-- Zasoby -->
        <a-assets>
            <a-asset-item id="sculpture-model" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Marker -->
        <a-marker type="pattern" url="marker.patt">
            <a-entity 
                gltf-model="#sculpture-model"
                position="0 0 0" 
                scale="1 1 1"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
