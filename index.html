<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosty AR w A-Frame</title>
    <!-- Dołączenie A-Frame oraz AR.js -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Scena AR.js z wyłączonym logowaniem w konsoli dla lepszej wydajności -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Zarządzanie zasobami: Ładowanie modelu 3D rzeźby -->
        <a-assets>
            <a-asset-item id="rzeźba" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Definicja Twojego markera .patt -->
        <!-- Pamiętaj, aby plik 'marker.patt' znajdował się w tym samym folderze co ten plik HTML -->
        <a-marker type="pattern" url="marker.patt">
            
            <!-- Wyświetlenie modelu rzeźby na markerze -->
            <!-- Skala (scale) i pozycja (position) mogą wymagać dopasowania w zależności od oryginalnego rozmiaru modelu -->
            <a-entity 
                gltf-model="#rzeźba" 
                position="0 0 0" 
                scale="1 1 1"
                rotation="0 0 0">
            </a-entity>

        </a-marker>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
