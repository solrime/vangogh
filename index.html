<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marker Based AR - Rzeźba</title>
    <!-- Dołączenie A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Dołączenie AR.js dla A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Ładowanie zasobów (Rzeźba GLB) -->
        <a-assets>
            <a-asset-item id="sculpture" src="https://cdn.tinyglb.com/models/9f265ca841134c088ae3333ee0143afd.glb"></a-asset-item>
        </a-assets>

        <!-- Definicja Twojego markera .patt -->
        <!-- UWAGA: Podmień 'pattern-qr-code.patt' na właściwą ścieżkę do Twojego pliku, jeśli zmienisz nazwę -->
        <a-marker type="pattern" url="pattern-qr-code (8).patt">
            
            <!-- Wyświetlenie trójwymiarowej rzeźby na markerze -->
            <!-- Skala (scale) oraz pozycja (position) mogą wymagać dostosowania pod wielkość modelu -->
            <a-entity 
                gltf-model="#sculpture" 
                scale="1 1 1" 
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>
            
        </a-marker>

        <!-- Kamera AR -->
        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
